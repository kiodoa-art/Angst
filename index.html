<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050509" />
  <title>Angst – kroppens reaktioner</title>
  <style>
    :root{
      --bg:#050509; --panel:rgba(13,13,18,.94); --text:#fff; --muted:#cfcfd8;
      --pink:#ff3b9a; --cyan:#00d6d6; --orange:#ff8500; --line:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 50% 0%,#14141d 0,#050509 42%,#000 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);}
    .page{width:min(100%,520px);margin:0 auto;min-height:100svh;background:#020204;box-shadow:0 0 60px rgba(0,0,0,.7)}
    header{position:sticky;top:0;z-index:20;padding:18px 18px 14px;background:linear-gradient(180deg,rgba(5,5,9,.98),rgba(5,5,9,.82));backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{margin:0;font-size:clamp(42px,12vw,64px);line-height:.86;letter-spacing:.08em;font-weight:900;background:linear-gradient(90deg,var(--pink),#ff6b6b,var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}.sub{font-size:clamp(17px,5vw,25px);letter-spacing:.32em;margin-top:9px;color:#f5eef2}.about{border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.05);color:#fff;padding:12px 15px;font-size:16px;white-space:nowrap}
    .stage{position:relative;width:100%;aspect-ratio:795/1536;overflow:hidden;background:#000}.body-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}.hotspot{position:absolute;border:0;background:transparent;border-radius:50%;transform:translate(-50%,-50%);width:13.5%;aspect-ratio:1;cursor:pointer;-webkit-tap-highlight-color:transparent}.hotspot:focus-visible{outline:3px solid white;outline-offset:3px}.hotspot::after{content:"";position:absolute;inset:5%;border-radius:50%;opacity:0;box-shadow:0 0 0 2px currentColor,0 0 25px currentColor;background:rgba(255,255,255,.04);transition:.15s}.hotspot:active::after,.hotspot.active::after{opacity:.9}.pink{color:var(--pink)}.cyan{color:var(--cyan)}.orange{color:var(--orange)}
    .hint{margin:12px 16px 6px;padding:12px 14px;border:1px solid rgba(255,255,255,.14);border-radius:14px;text-align:center;color:#eee;background:rgba(255,255,255,.05);font-size:15px}.cards{display:grid;grid-template-columns:1fr;gap:10px;padding:12px 16px 18px}.cat{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid currentColor;color:#fff;text-align:left}.cat b{font-size:18px}.cat span{font-size:13px;color:#d6d6df}.cat.pink{color:var(--pink)}.cat.cyan{color:var(--cyan)}.cat.orange{color:var(--orange)}.cat small{color:#fff;opacity:.8}.arrow{font-size:26px;color:#fff}
    footer{padding:0 18px 20px;color:#a9a9b4;font-size:12px;text-align:center}.shade{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;opacity:0;pointer-events:none;transition:.18s}.shade.show{opacity:1;pointer-events:auto}.sheet{position:fixed;left:50%;bottom:0;z-index:100;transform:translate(-50%,105%);width:min(100%,520px);max-height:82svh;overflow:auto;background:linear-gradient(180deg,rgba(18,18,25,.98),rgba(6,6,10,.98));border:1px solid currentColor;border-bottom:0;border-radius:24px 24px 0 0;padding:18px 18px 22px;box-shadow:0 -20px 70px rgba(0,0,0,.75);transition:.24s ease;color:var(--pink)}.sheet.show{transform:translate(-50%,0)}.sheet.cyan{color:var(--cyan)}.sheet.orange{color:var(--orange)}.sheet h2{margin:0 40px 14px 0;font-size:24px;line-height:1.15;color:currentColor}.close{position:absolute;right:14px;top:12px;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:white;font-size:28px}.section{border-top:1px solid rgba(255,255,255,.12);padding-top:13px;margin-top:13px}.section h3{margin:0 0 6px;font-size:15px;color:currentColor}.section p{margin:0;color:#eee;line-height:1.45;font-size:15px}.note{margin-top:14px;color:#bfc0cc;font-size:13px;line-height:1.4}.tag{display:inline-flex;border:1px solid currentColor;border-radius:999px;padding:4px 9px;margin-bottom:10px;font-size:12px;color:currentColor;background:rgba(255,255,255,.04)}
    @media (min-width:760px){.page{width:min(100%,760px)}.cards{grid-template-columns:repeat(3,1fr)}header{padding-inline:26px}.hint{margin-inline:26px}.stage{max-height:none}.sheet{width:min(760px,100%)}}
  </style>
</head>
<body>
  <main class="page">
    <header><div><h1>ANGST</h1><div class="sub">KROPPENS<br>REAKTIONER</div></div><button class="about" type="button" data-cat="about">ⓘ Om angst</button></header>
    <section class="stage" id="stage" aria-label="Klikbare reaktioner på kroppen"><img class="body-img" src="krop-ikoner-fast.png" alt="Kroppens reaktioner ved angst med neon-ikoner"></section>
    <div class="hint">Tryk på et ikon for at læse mere.</div>
    <section class="cards">
      <button class="cat pink" type="button" data-cat="kognitiv"><div><b>Kognitiv / sanse</b><br><span>Sanser, hukommelse og dissociation</span></div><span class="arrow">›</span></button>
      <button class="cat orange" type="button" data-cat="glatte"><div><b>Glatte muskulaturer</b><br><span>Organer og autonome reaktioner</span></div><span class="arrow">›</span></button>
      <button class="cat cyan" type="button" data-cat="tvaer"><div><b>Tværstribede muskler</b><br><span>Spænding, vejrtrækning og uro</span></div><span class="arrow">›</span></button>
    </section><footer>Grafik efter ISTDP-plakat. Webapp til undervisning og psykoedukation.</footer>
  </main>
  <div class="shade" id="shade"></div><aside class="sheet pink" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle"><button class="close" type="button" aria-label="Luk">×</button><div id="sheetContent"></div></aside>
<script>
const points=[
{id:'hallucinationer',x:25.4,y:6.9,c:'pink',title:'Hallucinationer i alle 5 sanser',what:'Man kan opleve syn, lyde, lugte, smag eller kropslige fornemmelser som virker meget virkelige, selv om de ikke passer med omgivelserne.',why:'Ved høj angst og stress kan hjernen blive overbelastet og fejlfortolke sanseindtryk. Det er især relevant ved udmattelse, søvnmangel, traumer eller dissociation.',when:'Søg faglig vurdering hvis det er nyt, tiltager, føles svært at styre, eller hvis personen bliver bange for at handle på oplevelserne.'},
{id:'susen',x:17.9,y:17.6,c:'cyan',title:'Hylen/susen for ørerne, svimmelhed',what:'Ringen, susen, trykken i hovedet, svimmelhed eller en følelse af at være ved siden af sig selv.',why:'Angst kan ændre vejrtrækning, muskelspænding og blodgennemstrømning. Spændinger i nakke/kæbe og hyperventilation kan gøre symptomerne værre.',when:'Reagér ved pludseligt høretab, kraftig ny svimmelhed, neurologiske symptomer, besvimelse eller vedvarende gener.'},
{id:'arme_nakke',x:14.4,y:27.7,c:'cyan',title:'Spænding i arme, nakke, hoved og skuldre',what:'Stramhed, ømhed, spændingshovedpine, låst nakke eller uro i arme og skuldre.',why:'Kroppen gør sig klar til kamp/flugt. Musklerne spænder op, ofte uden at man opdager det, og spændingen kan blive siddende længe efter angsten er faldet.',when:'Søg vurdering ved stærke smerter, kraftnedsættelse, føleforstyrrelser eller symptomer efter skade.'},
{id:'udmattet',x:14.3,y:38.0,c:'cyan',title:'Fryser, dissociation eller udmattethed',what:'Kuldefornemmelse, tomhed, frakobling, træthed eller at kroppen “lukker ned”.',why:'Når nervesystemet er presset længe, kan kroppen skifte fra alarm til nedlukning. Det kan føles som at være fjern, tung eller følelsesløs.',when:'Reagér hvis frakoblingen er hyppig, varer længe, giver blackouts, eller hvis personen ikke kan passe basale behov.'},
{id:'haender',x:13.9,y:48.0,c:'cyan',title:'Knyttede hænder',what:'Hænder der spænder, ryster, prikker eller knytter sig uden at man beslutter det.',why:'Angst øger muskeltonus og gør kroppen handlingsklar. Det kan også hænge sammen med hurtig vejrtrækning og spændinger i underarme.',when:'Søg hjælp ved vedvarende følelsesløshed, lammelse, blålige fingre eller stærke smerter.'},
{id:'kaebe',x:13.5,y:63.4,c:'cyan',title:'Kæbe-, hals- eller muskelspænding',what:'Trykken i kæbe/hals, klumpfornemmelse, tics, skæren tænder eller smerter i ansigt og nakke.',why:'Angst sætter ofte kæbe, hals og vejrtrækningsmuskler på overarbejde. Kroppen holder igen, spænder op eller prøver at kontrollere ubehaget.',when:'Reagér ved synkebesvær, vejrtrækningsbesvær, ensidige neurologiske symptomer eller ny kraftig smerte.'},
{id:'ben_foedder',x:18.3,y:79.6,c:'cyan',title:'Spænding/uro i mave, ben og fødder',what:'Sitren, rastløshed, uro i ben, maveuro eller fornemmelse af at skulle bevæge sig.',why:'Adrenalin gør kroppen klar til bevægelse. Hvis man bliver siddende, kan energien mærkes som indre uro, rysten eller rastløshed.',when:'Søg vurdering hvis uroen er ny, meget voldsom, ledsaget af smerter/hævelse i ben eller tydeligt påvirker søvn og funktion.'},
{id:'taaget',x:71.9,y:4.8,c:'pink',title:'Tåget, forvirret, mister tråden, dårlig hukommelse',what:'Man kan have svært ved at tænke klart, huske, finde ord eller følge en samtale.',why:'Angst flytter hjernens fokus fra refleksion til overlevelse. Arbejdshukommelse og koncentration falder, fordi alarmberedskabet fylder.',when:'Reagér ved akut forvirring, påvirket bevidsthed, feber, hovedtraume, rusmidler eller ny markant kognitiv ændring.'},
{id:'dissociation',x:81.6,y:10.2,c:'pink',title:'Fryser, dissociation, udmattet',what:'At “fryse fast”, blive fjern, miste kontakt til kroppen eller føle sig ekstremt træt.',why:'Dissociation er en beskyttelsesreaktion, hvor nervesystemet dæmper kontakt til indtryk, følelser eller kropsfornemmelser.',when:'Søg hjælp hvis det sker ofte, giver blackouts, farlige situationer eller er forbundet med traumer og stærk funktionspåvirkning.'},
{id:'syn',x:83.5,y:18.0,c:'pink',title:'Synsforstyrrelser og ændret synsfelt',what:'Sløret syn, tunnelsyn, lysfølsomhed, prikker, flimren eller fornemmelse af ikke at kunne fokusere.',why:'Alarmberedskab ændrer opmærksomhed, pupiller, muskelspænding og vejrtrækning. Hjernen scanner efter fare og sorterer sanser anderledes.',when:'Akut lægehjælp ved pludseligt synstab, dobbeltsyn, stærk hovedpine, neurologiske symptomer eller øjensmerter.'},
{id:'blodkar',x:83.1,y:28.0,c:'orange',title:'Blodkar: blussen, rødmen, migræne',what:'Varme, rødmen, dunkende hovedpine, trykfornemmelse eller migrænelignende symptomer.',why:'Angst påvirker det autonome nervesystem. Blodkar kan trække sig sammen eller udvide sig, og spænding/stress kan trigge hovedpine.',when:'Søg akut hjælp ved pludselig værste hovedpine, neurologiske udfald, brystsmerter eller besvimelse.'},
{id:'luftveje',x:86.6,y:34.0,c:'orange',title:'Luftveje: kvælningssymptomer',what:'Åndenød, trykken for brystet, klump i halsen eller følelse af ikke at kunne få luft nok.',why:'Angst kan give hurtig eller overfladisk vejrtrækning. Det kan skabe kuldioxid-fald, prikken, svimmelhed og kvælningsfornemmelse.',when:'Søg akut hjælp ved blå læber, brystsmerter, besvimelse, ny svær åndenød eller kendt hjerte-/lungesygdom.'},
{id:'hjerte',x:86.2,y:43.8,c:'orange',title:'Hjertekramper / arytmi',what:'Hjertebanken, ekstraslag, trykken, jag eller følelse af uregelmæssig rytme.',why:'Adrenalin øger puls og hjertekraft. Kroppen prøver at levere energi til kamp/flugt, og man mærker hjertet tydeligere.',when:'Akut vurdering ved brystsmerter, udstråling til arm/kæbe, åndenød, besvimelse, koldsved eller kendt hjertesygdom.'},
{id:'tarm',x:86.5,y:53.1,c:'orange',title:'Tarmsyndromer: kvalme, opkast, diarré',what:'Kvalme, mavekneb, diarré, opkastfornemmelse eller appetitløshed.',why:'Nervesystemet skruer ned for fordøjelsen under alarm. Tarmen er tæt forbundet med stresssystemet og reagerer hurtigt på angst.',when:'Søg vurdering ved blod i afføring/opkast, dehydrering, stærke mavesmerter, feber eller vedvarende symptomer.'},
{id:'blaere',x:86.7,y:61.9,c:'orange',title:'Blærepres og tissetrang',what:'Hyppig vandladning, tryk over blæren eller pludselig trang til at tisse.',why:'Autonom aktivering kan påvirke blære og bækkenbund. Spænding og alarm kan gøre signalerne fra blæren stærkere.',when:'Søg vurdering ved svie, blod i urin, feber, smerter i ryg/flanke eller ny inkontinens.'},
{id:'summen',x:84.8,y:75.0,c:'pink',title:'Summende fornemmelse i arme, hænder, ben eller fødder',what:'Prikken, summen, elektriske fornemmelser, sovende hænder/fødder eller små rystelser.',why:'Hyperventilation, muskelspænding og stresshormoner kan påvirke nerver og blodgennemstrømning. Det føles ubehageligt, men er ofte ufarligt ved angst.',when:'Søg akut hjælp ved ensidig lammelse, talebesvær, ansigtslammelse, pludselig føleforstyrrelse eller symptomer der ikke aftager.'}
];
const cats={
about:{c:'pink',title:'Om angst og kroppen',tag:'Psykoedukation',sections:[['Hvad er pointen?','Angst er ikke kun tanker. Det er en kropslig alarmreaktion, hvor nervesystem, sanser, muskler, hjerte, vejrtrækning og fordøjelse kan reagere samtidig.'],['Vigtigt','Webappen er til undervisning og forståelse. Den erstatter ikke lægelig vurdering ved akutte, nye eller alvorlige symptomer.']]},
kognitiv:{c:'pink',title:'Kognitiv / sanseforstyrrelser',tag:'Sanser og bevidsthed',sections:[['Området dækker','Hallucinationer, tågethed, dårlig hukommelse, dissociation, synsforstyrrelser, svimmelhed og ændrede sanseindtryk.'],['Kort forklaring','Når nervesystemet er i alarm, bliver hjernen mindre præcis. Den scanner efter fare, tolker hurtigere og tænker dårligere.']]},
glatte:{c:'orange',title:'Glatte muskulaturer',tag:'Organer og autonome reaktioner',sections:[['Området dækker','Blodkar, luftveje, hjerte, tarm og blære. Det er funktioner, man ikke styrer direkte med viljen.'],['Kort forklaring','Det autonome nervesystem kan give hjertebanken, åndenød, kvalme, diarré, rødmen og tissetrang.']]},
tvaer:{c:'cyan',title:'Tværstribede muskler',tag:'Bevægelse og spænding',sections:[['Området dækker','Spændinger i nakke, skuldre, arme, kæbe, hænder, mave, ben og fødder.'],['Kort forklaring','Kroppen gør sig klar til kamp eller flugt. Hvis energien ikke bruges, mærkes den som spænding, uro, rysten eller smerter.']]}
};
const stage=document.getElementById('stage');
const sheet=document.getElementById('sheet');const content=document.getElementById('sheetContent');const shade=document.getElementById('shade');
function htmlForPoint(p){return `<span class="tag">${p.id}</span><h2 id="sheetTitle">${p.title}</h2><div class="section"><h3>Hvad opleves?</h3><p>${p.what}</p></div><div class="section"><h3>Hvorfor sker det ved angst?</h3><p>${p.why}</p></div><div class="section"><h3>Hvornår bør man reagere?</h3><p>${p.when}</p></div><p class="note">Ved akutte eller alvorlige symptomer skal man ikke “forklare det væk” som angst. Få det vurderet.</p>`}
function htmlForCat(o){return `<span class="tag">${o.tag}</span><h2 id="sheetTitle">${o.title}</h2>${o.sections.map(s=>`<div class="section"><h3>${s[0]}</h3><p>${s[1]}</p></div>`).join('')}`}
function openSheet(color,html){sheet.className='sheet show '+color;content.innerHTML=html;shade.classList.add('show')}
function closeSheet(){sheet.classList.remove('show');shade.classList.remove('show');document.querySelectorAll('.hotspot.active').forEach(b=>b.classList.remove('active'))}
points.forEach(p=>{const b=document.createElement('button');b.className='hotspot '+p.c;b.style.left=p.x+'%';b.style.top=p.y+'%';b.type='button';b.setAttribute('aria-label',p.title);b.addEventListener('click',()=>{document.querySelectorAll('.hotspot.active').forEach(x=>x.classList.remove('active'));b.classList.add('active');openSheet(p.c,htmlForPoint(p));});stage.appendChild(b);});
document.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{const o=cats[b.dataset.cat];openSheet(o.c,htmlForCat(o));}));
document.querySelector('.close').addEventListener('click',closeSheet);shade.addEventListener('click',closeSheet);document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});
</script>
</body>
</html>
